<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}通用主题日报{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">主题日报</a>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/topics">主题管理</a>
      <a href="/recipients">收件人管理</a>
      <a href="/topics/generate">AI 生成主题</a>
      <a href="/sources">全局来源</a>
      <a href="/settings">设置</a>
      <a href="/preview">预览日报</a>
      <form method="post" action="/send-test" class="inline">
        <button type="submit" class="link-button">发送测试邮件</button>
      </form>
      <a href="/runs">运行记录</a>
      <form method="post" action="/logout" class="inline">
        <button type="submit" class="link-button">退出</button>
      </form>
    </nav>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
